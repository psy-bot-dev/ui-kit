name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@psy-bot-dev"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Release
        run: |
          set +e
          output=$(pnpm release 2>&1)
          code=$?
          set -e
          echo "$output"
          if [ $code -ne 0 ]; then
            if echo "$output" | grep -qEi 'already published|version already exists|cannot publish over|duplicate version|tag .* already exists|fatal: tag .* already exists'; then
              echo "Release already applied (version or tag exists), treating as success"
              exit 0
            fi
            exit $code
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
