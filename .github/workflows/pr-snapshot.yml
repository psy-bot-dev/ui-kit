name: "PR: Snapshot Alpha Publish"

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  packages: write
  pull-requests: write
  issues: read

jobs:
  snapshot:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/snapshot') &&
      (github.event.comment.author_association == 'COLLABORATOR' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'OWNER')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@psy-bot-dev"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Restore build cache
        id: build-cache
        uses: actions/cache@v5
        with:
          path: packages/*/dist
          key: build-${{ hashFiles('packages/*/src/**', 'packages/*/vite.config.ts', 'packages/*/tsconfig.json', 'packages/*/postcss.config.*', 'tooling/**') }}

      - name: Build
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: pnpm -r build

      - name: Publish snapshot
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          pnpm -r exec -- node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            if (!pkg.private) {
              const base = pkg.version.replace(/-.*$/, '');
              pkg.version = base + '-alpha.$SHORT_SHA';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            }
          "
          set +e
          output=$(pnpm -r publish --tag alpha --no-git-checks 2>&1)
          code=$?
          set -e
          echo "$output"
          if [ $code -ne 0 ]; then
            if echo "$output" | grep -qEi 'already published|version already exists|cannot publish over|duplicate version|EPUBLISHCONFLICT'; then
              echo "Snapshot version already in registry, treating as success"
              exit 0
            fi
            exit $code
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment with versions
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const output = execSync(
              'pnpm -r exec -- node -e "const p=require(\'./package.json\'); if(!p.private) console.log(p.name + \'@\' + p.version)"',
              { encoding: 'utf-8' }
            );
            const versions = output
              .trim()
              .split('\n')
              .filter(Boolean)
              .map((v) => `- \`${v}\``)
              .join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### 📦 Snapshot published\n\n${versions}\n\nInstall:\n\`\`\`bash\npnpm add @psy-bot-dev/tokens@alpha\n\`\`\``,
            });
