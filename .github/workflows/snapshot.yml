name: Snapshot Release

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  packages: write
  pull-requests: write
  issues: read

jobs:
  snapshot:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/snapshot') &&
      (github.event.comment.author_association == 'COLLABORATOR' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'OWNER')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@psy-bot-dev"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Publish snapshot
        run: |
          pnpm changeset version --snapshot alpha
          pnpm -r publish --tag alpha --no-git-checks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment with versions
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const output = execSync(
              'pnpm -r exec -- node -e "const p=require(\'./package.json\'); if(!p.private) console.log(p.name + \'@\' + p.version)"',
              { encoding: 'utf-8' }
            );
            const versions = output
              .trim()
              .split('\n')
              .filter(Boolean)
              .map((v) => `- \`${v}\``)
              .join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### 📦 Snapshot published\n\n${versions}\n\nInstall:\n\`\`\`bash\npnpm add @psy-bot-dev/tokens@alpha\n\`\`\``,
            });
