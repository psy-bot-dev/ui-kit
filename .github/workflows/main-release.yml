name: "Main: Semantic Release & Publish"

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@psy-bot-dev"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Restore build cache
        id: build-cache
        uses: actions/cache@v5
        with:
          path: packages/*/dist
          key: build-${{ hashFiles('packages/*/src/**', 'packages/*/vite.config.ts', 'packages/*/tsconfig.json', 'packages/*/postcss.config.*', 'tooling/**') }}

      - name: Build
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: pnpm -r build

      - name: Release
        run: |
          set +e
          output=$(pnpm release 2>&1)
          code=$?
          set -e
          echo "$output"
          echo "$output" > release-output.txt
          if [ $code -ne 0 ]; then
            if echo "$output" | grep -qEi 'already published|version already exists|cannot publish over|duplicate version|tag .* already exists|fatal: tag .* already exists'; then
              echo "Release already applied (version or tag exists), treating as success"
              exit 0
            fi
            exit $code
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish any packages that were cascade-bumped by multi-semantic-release
      # but not published (no code changes). This prevents broken workspace:* resolution
      # where ui@x.y.z depends on button@0.2.1 that was bumped locally but never published.
      - name: Publish cascade-bumped packages
        if: success()
        run: |
          set +e
          output=$(pnpm -r --filter './packages/*' publish --no-git-checks 2>&1)
          echo "$output"
          set -e
          if echo "$output" | grep -qEi 'already published|version already exists|cannot publish over|duplicate version|EPUBLISHCONFLICT'; then
            echo "All cascade-bumped packages now published (some were already in registry)"
            exit 0
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show published packages
        if: success()
        run: |
          echo ""
          echo "::group::📦 PUBLISHED PACKAGES"
          if [ -f release-output.txt ]; then
            published=$(grep -Ei 'published|releasing' release-output.txt | grep -oE '@psy-bot-dev/[^@[:space:]]+@[0-9][^[:space:]"]*' | sort -u || true)
            if [ -n "$published" ]; then
              echo "$published" | while read -r line; do echo "  $line"; done
            else
              echo "  (no new versions published this run)"
            fi
          else
            echo "  (release output not available)"
          fi
          echo "::endgroup::"
